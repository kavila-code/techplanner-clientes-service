services:

  postgres:
    image: postgres:16

    container_name: techplanner-postgres

    environment:
      POSTGRES_DB: techplanner
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  clientes-service:
    build:
      context: ./clientes-service
      dockerfile: Dockerfile
    container_name: techplanner-clientes
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techplanner
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  postgres_data: